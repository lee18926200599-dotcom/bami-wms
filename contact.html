<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 车拉拉</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B35; --primary-dark: #E55A2B;
            --dark: #1A1A2E; --light: #F8F9FA;
            --gradient: linear-gradient(135deg, #FF6B35 0%, #FF8E53 100%);
        }
        body { font-family: 'Noto Sans SC', sans-serif; line-height: 1.6; color: #333; }
        
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center; height: 80px;
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon {
            width: 50px; height: 50px; background: var(--gradient);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
        }
        .logo-text { font-size: 28px; font-weight: 900; color: var(--dark); }
        .logo-text span { color: var(--primary); }
        
        .nav-menu { display: flex; gap: 40px; list-style: none; }
        .nav-menu a {
            text-decoration: none; color: #555; font-weight: 500; font-size: 16px;
            position: relative; transition: color 0.3s;
        }
        .nav-menu a::after {
            content: ''; position: absolute; bottom: -5px; left: 0;
            width: 0; height: 3px; background: var(--primary); transition: width 0.3s;
        }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary); }
        .nav-menu a.active::after { width: 100%; }
        
        .btn {
            padding: 12px 28px; border-radius: 8px; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; border: none;
        }
        .btn-primary {
            background: var(--gradient); color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5); }
        
        .page-header {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            padding: 160px 0 80px; text-align: center; color: white;
        }
        .page-header h1 { font-size: 56px; font-weight: 900; margin-bottom: 20px; }
        .page-header h1 span {
            background: var(--gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .breadcrumb { color: rgba(255,255,255,0.6); font-size: 16px; }
        .breadcrumb a { color: rgba(255,255,255,0.8); text-decoration: none; }
        
        .contact-section {
            padding: 100px 0; max-width: 1200px; margin: 0 auto; padding-left: 30px; padding-right: 30px;
        }
        .contact-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
        }
        
        .contact-info h2 {
            font-size: 36px; font-weight: 900; color: var(--dark); margin-bottom: 30px;
        }
        .contact-info h2 span { color: var(--primary); }
        .contact-info p { color: #666; font-size: 16px; margin-bottom: 40px; }
        
        .info-item {
            display: flex; align-items: flex-start; gap: 20px; margin-bottom: 30px;
        }
        .info-icon {
            width: 60px; height: 60px; background: var(--gradient);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
        }
        .info-content h3 { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 5px; }
        .info-content p { color: #666; margin: 0; }
        
        .contact-form {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .contact-form h3 {
            font-size: 28px; font-weight: 700; color: var(--dark); margin-bottom: 30px;
        }
        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block; font-size: 14px; font-weight: 600; color: var(--dark);
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%; padding: 15px; border: 2px solid #E2E8F0;
            border-radius: 10px; font-size: 15px; transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        
        .footer { background: var(--dark); color: white; padding: 60px 0 30px; }
        .footer-container { max-width: 1200px; margin: 0 auto; padding: 0 30px; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .footer-links a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.3s; }
        .footer-links a:hover { color: var(--primary); }
        .footer p { color: rgba(255,255,255,0.4); }
        
        @media (max-width: 768px) {
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-truck"></i></div>
                <span class="logo-text">车拉<span>拉</span></span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="services.html">服务介绍</a></li>
                <li><a href="join.html">加盟合作</a></li>
                <li><a href="contact.html" class="active">联系我们</a></li>
            </ul>
            <a href="contact.html" class="btn btn-primary">立即咨询</a>
        </div>
    </nav>

    <header class="page-header">
        <h1>联系<span>我们</span></h1>
        <div class="breadcrumb"><a href="index.html">首页</a> / 联系我们</div>
    </header>

    <section class="contact-section">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>与我们<span>取得联系</span></h2>
                <p>无论您有任何问题或合作意向，欢迎随时联系我们</p>
                
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <div class="info-content">
                        <h3>客服热线</h3>
                        <p>400-888-8888</p>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div class="info-content">
                        <h3>电子邮箱</h3>
                        <p>service@chelala.com</p>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="info-content">
                        <h3>公司地址</h3>
                        <p>深圳市南山区科技园南区高新南一道</p>
                    </div>
                </div>
            </div>
            
            <div class="contact-form">
                <h3>在线咨询</h3>
                <form>
                    <div class="form-group">
                        <label>您的姓名</label>
                        <input type="text" placeholder="请输入您的姓名">
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="tel" placeholder="请输入您的电话">
                    </div>
                    <div class="form-group">
                        <label>电子邮箱</label>
                        <input type="email" placeholder="请输入您的邮箱">
                    </div>
                    <div class="form-group">
                        <label>咨询内容</label>
                        <textarea placeholder="请描述您的需求或问题"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        提交咨询
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我们</a>
                <a href="services.html">服务介绍</a>
                <a href="join.html">加盟合作</a>
                <a href="contact.html">联系我们</a>
            </div>
            <p>&copy; 2026 车拉拉. All rights reserved. | 八米科技旗下品牌</p>
        </div>
    </footer>
</body>
</html>
