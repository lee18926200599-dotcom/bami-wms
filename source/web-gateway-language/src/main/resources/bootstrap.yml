server:
  port: 9900

# eureka
eureka:
  instance:
    # ipAddress: 192.168.0.100  # 指定此实例的ip
    preferIpAddress: true  # 注册时使用ip而不是主机名
    instanceId: ${spring.cloud.client.ip-address}:${server.port}
    # 状态地址为api地址
    statusPageUrlPath: /info.html
    leaseRenewalIntervalInSeconds: 10
    leaseExpirationDurationInSeconds: 15
    health-check-url-path: /actuator/health
#    appGroupName: DEFAULT_GROUP

spring:
  profiles:
    active: yunshan
  application:
    name: web-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowCredentials: true
            allowedHeaders: '*'
            allowedMethods: '*'
            allowedOrigins: '*'
            maxAge: 18000

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  sleuth:
    enable: true
    sampler:
      probability: 1.0

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: ALWAYS


feign:
  hystrix:
    enabled: true
hystrix:
  command:
    default:
      execution:
        timeout:
          enabled: true
        isolation:
          thread:
            timeoutInMilliseconds: 760000
ribbon:
  ReadTimeout: 600000
  ConnectTimeout: 600000
  MaxAutoRetries: 1
  MaxAutoRetriesNextServer: 2
  group:
    dynamic: true
